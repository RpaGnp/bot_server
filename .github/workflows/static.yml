name: Deploy

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:

    - uses: actions/checkout@v4

    - name: Deploy
      run: |
        chmod +x start_bots.sh
        bash start_bots.sh